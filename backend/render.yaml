# Render Blueprint — deploy backend BẢN TIN AN TOÀN.
# Nếu đã tạo service thủ công: chỉ cần đổi Start Command trong dashboard thành startCommand bên dưới.
services:
  - type: web
    name: dienbien-ews-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_BACKEND
        value: supabase
      - key: WEATHER_PROVIDER
        value: openmeteo
      - key: LLM_PROVIDER
        value: mock
      # Uỷ thác AI cho agent_worker (Render) qua HTTP.
      - key: AGENT_MODE
        value: remote
      - key: AGENT_BASE_URL
        value: https://quto-ai-2.onrender.com
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://localhost:3001,https://quto-ai.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false   
      - key: SUPABASE_KEY
        sync: false  
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://localhost:3001,https://quto-ai.vercel.app
