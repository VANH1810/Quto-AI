# Backend AI TỰ CHỨA (agent_worker) — build CHỈ từ agent_worker/ (context: .).
#
#   cd agent_worker && docker compose up --build
#     Swagger (API AI): http://localhost:8100/docs   (submit/poll/approve + seed + dữ liệu)
#     RabbitMQ UI      : http://localhost:15672  (guest/guest)
#
# 4 process ứng dụng (chung 1 image agent_worker):
#   agent-api      : FastAPI + Swagger (cổng 8100)
#   agent-worker   : Celery worker chạy graph LLM (queue 'agent')
#   dispatch-worker: Celery worker gửi đa kênh (queue 'dispatch')
# Dữ liệu (dân/cán bộ/trú ẩn/notifications) nằm trong Postgres của chính stack này.

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quto
      POSTGRES_PASSWORD: quto
      POSTGRES_DB: quto
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quto"]
      interval: 10s
      timeout: 5s
      retries: 10

  # API + Swagger của backend AI (control-plane + seed + tra cứu dữ liệu) — cổng 8100.
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "agent_worker.api:app", "--host", "0.0.0.0", "--port", "8100"]
    environment: &worker_env
      # Dev vẫn dùng RabbitMQ làm broker (đặt tường minh; prod dùng Redis, xem
      # docker-compose.prod.yml). Bỏ dòng này → tự động chuyển broker sang Redis.
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://quto:quto@postgres:5432/quto
      LLM_PROVIDER: ${LLM_PROVIDER:-fpt}              # openai | local | fpt (agent cần tool-calling)
      FPT_API_KEY: ${FPT_API_KEY:-}
      FPT_BASE_URL: ${FPT_BASE_URL:-https://mkp-api.fptcloud.com/v1/}
      FPT_MODEL: ${FPT_MODEL:-DeepSeek-V4-Flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      HUMAN_APPROVAL_MIN_LEVEL: ${HUMAN_APPROVAL_MIN_LEVEL:-3}
      WEATHER_PROVIDER: ${WEATHER_PROVIDER:-openmeteo}  # 'mock' = luôn mưa lớn (demo cảnh báo)
      MOCK_PRECIP_MM: ${MOCK_PRECIP_MM:-220}
      ROUTE_PROVIDER: ${ROUTE_PROVIDER:-none}          # 'serpapi' để bật km/phút + POI
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      DATA_SOURCE: ${DATA_SOURCE:-local}               # 'supabase' = đọc dữ liệu thật từ Supabase
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}                  # service_role key
      MIRROR_NOTIFICATIONS_SUPABASE: ${MIRROR_NOTIFICATIONS_SUPABASE:-true}
      TELEGRAM_PROVIDER: ${TELEGRAM_PROVIDER:-mock}   # 'live' để gửi Telegram thật
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN_2: ${TELEGRAM_BOT_TOKEN_2:-}  # bot demo cho /demo/telegram-mock
      BACKEND_URL: http://host.docker.internal:8000   # callback về backend (host)
      SERVICE_TOKEN: doi-chuoi-bi-mat-nay             # == SERVICE_TOKEN của backend
    extra_hosts: ["host.docker.internal:host-gateway"]
    ports: ["8100:8100"]
    depends_on:
      rabbitmq: {condition: service_healthy}
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}

  # Celery worker: chạy graph (LLM). Queue 'agent'.
  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "agent_worker.celery_app", "worker", "-Q", "agent", "--pool=threads", "--concurrency=16", "--loglevel=info"]
    environment: *worker_env
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      rabbitmq: {condition: service_healthy}
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}

  # Celery worker: gửi đa kênh (Zalo/SMS/loa). Queue 'dispatch' — làm callback về backend.
  dispatch-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "agent_worker.celery_app", "worker", "-Q", "dispatch", "--pool=threads", "--concurrency=32", "--loglevel=info"]
    environment: *worker_env
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      rabbitmq: {condition: service_healthy}
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}

volumes:
  pgdata:
